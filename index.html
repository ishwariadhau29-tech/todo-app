<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link  rel="stylesheet" href="style.css">
</head>
<body>
    <h1>To-Do App</h1>
    <div class="box">
   <h2 id="user">Enter your task</h2>
        <div class="container">
   <input type="text" placeholder="task" id="task">
   <button type="clear" id="add">Enter + </button>
        </div>
   <br><br>

    <h3 id="output">Tasks : </h3>
    <h4>NO TASK YET</h4>
        
    <ul id="list"> </ul>
  <h4 id="counter">Pending : 0</h4>
    <button type="submit" id="submitBtn">Done</button>
    <br><br>
     <button type="reset" id="resetBtn">Reset</button>
    </div>

   

    <script src="script.js"></script>
</body>
</html>
